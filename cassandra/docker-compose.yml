version: "3.9"

services:
  cassandra:
    image: cassandra:4.1
    container_name: cassandra
    ports:
      - "9042:9042"
    environment:
      CASSANDRA_CLUSTER_NAME: "ChatDemoCluster"
      CASSANDRA_DC: "dc1"
      CASSANDRA_RACK: "rack1"
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'DESCRIBE KEYSPACES'"]
      interval: 20s
      timeout: 10s
      retries: 15
    volumes:
      - cassandra_data:/var/lib/cassandra

  loader:
    build: ./loader
    depends_on:
      cassandra:
        condition: service_healthy
    environment:
      CASSANDRA_HOST: cassandra
      CASSANDRA_KEYSPACE: chat_demo

volumes:
  cassandra_data: